<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

<main class="container">

  <form id="quizForm">

    <input type="radio" name="q1" value="correct"> HyperText Markup Language<br>
    <input type="radio" name="q1" value="wrong"> HighText Machine Language<br>

    <input type="radio" name="q2" value="wrong"> &lt;script&gt;<br>
    <input type="radio" name="q2" value="correct"> &lt;style&gt;<br>

    <h3>3. What does JS stand for?</h3>
    <input type="radio" name="q3" value="correct"> JavaScript<br>
    <input type="radio" name="q3" value="wrong"> JavaStarter<br>

    <button class="btn" type="button" onclick="submitQuiz()">Submit</button>
  </form>

  <h2 id="quizResult"></h2>
