<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel – LMS FOR LEARNING</title>
  <link rel="stylesheet" href="style.css">

  <!-- Firebase + Admin Scripts -->
  <script type="module" src="firebase.js"></script>
  <script type="module" src="admin.js"></script>

  <style>
    body {
      background: #eef2f5;
      font-family: Arial, sans-serif;
    }

    nav {
      width: 100%;
      padding: 20px;
      background: #004aad;
      color: white;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    nav a { color: white; margin-right: 20px; }

    .admin-container {
      max-width: 900px;
      margin: 30px auto;
      padding: 20px;
      background: white;
      border-radius: 12px;
      box-shadow: 0 3px 10px rgba(0,0,0,0.1);
    }

    .admin-section {
      margin-bottom: 40px;
      padding-bottom: 20px;
      border-bottom: 2px solid #ccc;
    }

    input, textarea {
      width: 100%;
      padding: 12px;
      margin-top: 8px;
      margin-bottom: 12px;
      border-radius: 8px;
      border: 1px solid #aaa;
      font-size: 16px;
    }

    button {
      padding: 10px 20px;
      background: #0071e3;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background: #005bb5;
    }

    #userList, #certList {
      background: #f9f9f9;
      padding: 15px;
      border-radius: 10px;
      max-height: 300px;
      overflow-y: auto;
    }

    .item-box {
      background: white;
      padding: 15px;
      border-radius: 8px;
      margin-bottom: 10px;
      border-left: 5px solid #0084ff;
    }
  </style>
</head>

<body>

<nav>
  <h2 class="logo">ADMIN – LMS FOR LEARNING</h2>
  <div>
    <a href="dashboard.html">Dashboard</a>
    <a href="profile.html">Profile</a>
    <a href="certificate.html">Certificates</a>
    <a href="#" id="logoutBtn">Logout</a>
  </div>
</nav>

<div class="admin-container">

  <!-- ANNOUNCEMENTS -->
  <div class="admin-section">
    <h2>Add Announcement</h2>
    <input id="announceTitle" type="text" placeholder="Announcement Title">
    <textarea id="announceBody" rows="4" placeholder="Announcement Message"></textarea>
    <button id="postAnnouncement">Post Announcement</button>
  </div>



<!-- Add Course with multiple lessons -->
<div class="admin-section">
  <h2>Add Course (with lessons)</h2>

  <input id="courseTitle" type="text" placeholder="Course Title">
  <input id="courseThumbnail" type="text" placeholder="Thumbnail URL (optional)">
  <input id="courseDescription" type="text" placeholder="Short Description">
  <div id="lessonsEditor">
    <h4>Lessons</h4>
    <div id="lessonsList"></div>

    <input id="lessonTitleInput" type="text" placeholder="Lesson title">
    <input id="lessonVideoInput" type="text" placeholder="Lesson video URL (YouTube)">
    <button id="addLessonBtn" class="btn">Add Lesson</button>
  </div>

  <button id="saveCourseBtn" class="btn" style="margin-top:12px;">Save Course</button>
</div>




  <!-- USERS -->
  <div class="admin-section">
    <h2>Users List</h2>
    <div id="userList">Loading users…</div>
  </div>

  <!-- CERTIFICATES -->
  <div class="admin-section">
    <h2>Certificates</h2>
    <div id="certList">Loading certificates…</div>
  </div>

</div>

<script type="module" src="firebase.js"></script>
<script type="module" src="auth.js"></script>
<script type="module" src="admin.js"></script>


</body>
</html>
