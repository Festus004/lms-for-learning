<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>LMS — Register</title>
    <link rel="stylesheet" href="style.css">

    <script src="https://unpkg.com/@lottiefiles/lottie-player@latest/dist/lottie-player.js"></script>
    <script src="ui.js"></script>

    <style>
        .auth-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 50px;
            padding: 40px;
            min-height: 70vh;
        }
        .auth-box {
            max-width: 350px;
            width: 100%;
            background: var(--card);
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .animation-box {
            width: 350px;
        }
        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0 20px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
            display: block;
        }
        .btn {
            width: 100%;
            padding: 12px;
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }
        .btn:hover {
            background-color: #218838;
        }
        .muted {
            text-align: center;
            margin-top: 15px;
            font-size: 0.9em;
        }
    </style>
</head>

<body>
<nav>
    <h2 class="logo">LMS FOR LEARNING</h2>

    <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="courses.html">Courses</a>
        <a href="videos.html">Videos</a>
        <a href="login.html">Login</a>
        <a href="register.html">Sign Up</a>
        <a href="developer.html">Developer</a>
        <a href="verify.html">Verification</a>
    </div>

    <div class="nav-actions">
        <button class="toggle-dark" onclick="toggleDarkMode()" aria-label="Toggle dark mode">🌙</button>
    </div>
</nav>

<main>
    <div class="auth-container">

        <div class="animation-box">
            <lottie-player 
                src="https://assets9.lottiefiles.com/packages/lf20_0yfsb3a1.json"
                background="transparent" 
                speed="1" 
                style="width: 100%; height: 100%;" 
                loop 
                autoplay>
            </lottie-player>
        </div>

        <div class="auth-box">
            <h2>Create Account</h2>

            <form id="registerForm">
                <label for="name">Full Name</label>
                <input id="name" type="text" placeholder="John Doe" required>

                <label for="email">Email</label>
                <input id="email" type="email" placeholder="email@example.com" required>

                <label for="password">Password</label>
                <input id="password" type="password" placeholder="••••••••" required>

                <button class="btn" type="submit">Register</button>

                <p class="muted">Already have an account? <a href="login.html">Login</a></p>
            </form>
        </div>

    </div>
</main>

<script type="module" src="auth.js"></script>

<footer class="site-footer">
    <p>&copy; 2025 LMS FOR LEARNING | #festuserick4@gmail.com</p>
</footer>

</body>
</html>
