  <main class="auth">
    <h2>Create Account</h2>
    <form id="registerForm">
      <label for="regName">Full Name</label>
      <input id="regName" type="text" required>

      <label for="regEmail">Email</label>
      <input id="regEmail" type="email" required>

      <label for="regPass">Password</label>
      <input id="regPass" type="password" required>

      <button class="btn" type="submit">Register</button>
      <p class="muted">Already have an account? <a href="login.html">Login</a></p>
    </form>
  </main>
<script type="module" src="firebase.js"></script>
<script type="module" src="auth.js"></script>
<script type="module" src="script.js"></script>




<script type="module">
  import { registerUser } from './auth.js';
  // optionally expose to window for older invoked handlers:
  window.registerUser = registerUser;
</script>


<script type="module">
import { auth, db } from "./firebase.js";
import { createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.6.0/firebase-auth.js";
import { doc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.6.0/firebase-firestore.js";

const regForm = document.getElementById("registerForm");

regForm.addEventListener("submit", async (e) => {
    e.preventDefault();

    const name = document.getElementById("regName").value.trim();
    const email = document.getElementById("regEmail").value.trim();
    const pass = document.getElementById("regPass").value;

    try {
        // Create account in Firebase Auth
        const userCred = await createUserWithEmailAndPassword(auth, email, pass);

        // Save profile to Firestore
        await setDoc(doc(db, "users", userCred.user.uid), {
            name: name,
            email: email,
            joined: serverTimestamp(),
            progress: {},
            scores: {}
        });

        alert("Account created successfully!");
        window.location.href = "dashboard.html";
    } catch (err) {
        alert(err.message);
    }
});
</script>
<script type="module" src="firebase.js"></script>
<script type="module" src="auth.js"></script>
