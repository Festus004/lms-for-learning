<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Verify Credential — NextGen-LMS</title>
    <link rel="stylesheet" href="style.css" />
    <style>
        .verify-container { max-width: 600px; margin: 60px auto; padding: 20px; text-align: center; }
        .input-group { display: flex; gap: 10px; margin: 25px 0; }
        #codeInput { flex: 1; padding: 14px; border: 2px solid #e2e8f0; border-radius: 8px; font-family: monospace; font-size: 16px; outline: none; transition: border-color 0.2s; }
        #codeInput:focus { border-color: #0b3d91; }
        
        .result-card { 
            display: none; 
            background: white; 
            padding: 30px; 
            border-radius: 12px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            border-top: 6px solid #10b981; 
            text-align: left;
            margin-top: 30px;
        }
        /* Error state for the card */
        .result-card.error-card { border-top-color: #ef4444; }
        
        .badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: bold; margin-bottom: 15px; }
        .verify-badge { background: #dcfce7; color: #166534; }
        
        .btn-primary { background:#0b3d91; color:white; border:none; padding:0 25px; border-radius:8px; cursor:pointer; font-weight:600; transition: opacity 0.2s; }
        .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }
    </style>
</head>
<body>
    <nav style="background:#fff; padding:15px 20px; box-shadow:0 2px 8px rgba(0,0,0,0.06);">
        <div style="max-width:1100px; margin:0 auto; display: flex; justify-content: space-between; align-items: center;">
            <h2 style="margin:0; color:#0b3d91;">NextGen-LMS</h2>
            <a href="index.html" style="text-decoration: none; color: #64748b; font-size: 14px; font-weight: 600;">← Back to Home</a>
        </div>
    </nav>

    <main class="verify-container">
        <h1 style="color: #1e293b;">Verify Certificate</h1>
        <p style="color: #64748b;">Enter the unique certificate code or scan the QR code to verify authenticity.</p>

        <div class="input-group">
            <input id="codeInput" type="text" placeholder="e.g. LMS-K8J2-M9L1" spellcheck="false">
            <button id="verifyBtn" class="btn-primary">Verify</button>
        </div>

        <div id="statusMessage" style="margin-top: 10px; font-size: 14px; color: #64748b; min-height: 20px;"></div>

        <div id="verifyResult" class="result-card">
            <div id="resBadge" class="badge verify-badge">✓ VALID CREDENTIAL</div>
            
            <h2 id="resStudent" style="margin:0 0 5px 0; color: #1e293b;">Student Name</h2>
            <p id="resCourse" style="color:#475569; font-size: 18px; margin: 0 0 20px 0; font-weight: 500;">Course Title</p>
            
            <div style="display: flex; justify-content: space-between; border-top: 1px solid #f1f5f9; padding-top: 15px; font-size: 14px;">
                <div>
                    <span style="color:#94a3b8;">Issued On:</span><br>
                    <strong id="resDate" style="color: #334155;">--/--/----</strong>
                </div>
                <div style="text-align: right;">
                    <span style="color:#94a3b8;">Certificate ID:</span><br>
                    <strong id="resId" style="color: #334155; font-family: monospace;">-------</strong>
                </div>
            </div>
        </div>
    </main>

    <footer style="text-align: center; margin-top: 40px; color: #94a3b8; font-size: 13px;">
        © 2026 NextGen-LMS Verification Portal
    </footer>

    <script type="module" src="verify.js"></script>
</body>
</html>
